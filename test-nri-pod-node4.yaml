apiVersion: v1
kind: Pod
metadata:
  name: test-nri-interface-node4
  namespace: default
spec:
  containers:
  - name: test-container
    image: nicolaka/netshoot
    command: ["/bin/bash"]
    args: ["-c", "echo 'Testing NRI network interface injection on node 4...'; echo 'Initial interfaces:'; ip link show; echo 'Environment variables:'; env | grep NRI_ || echo 'No NRI_ env vars found'; echo 'Sleeping for 10 minutes to allow connectivity testing...'; sleep 80000"]
    resources:
      claims:
      - name: nic
    securityContext:
      capabilities:
        add: ["NET_ADMIN", "SYS_ADMIN"]
  resourceClaims:
  - name: nic
    resourceClaimTemplateName: single-nic
  restartPolicy: Never
  nodeName: myvm3000004  # Force pod to run on myvm3000004
  tolerations:
  - operator: Exists